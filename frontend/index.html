<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster | 3-Tier App</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #ec4899;
            --bg: #0f172a;
            --surface: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        
        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(236, 72, 153, 0.15) 0%, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
            animation: slideDown 0.8s ease-out;
        }

        .header h1 {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .status-bar {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 1rem;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--surface);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #f59e0b;
            box-shadow: 0 0 10px #f59e0b;
        }
        .dot.online { background: #10b981; box-shadow: 0 0 10px #10b981; }
        .dot.offline { background: #ef4444; box-shadow: 0 0 10px #ef4444; }

        .app-container {
            width: 100%;
            max-width: 600px;
            background: var(--surface);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 1s ease-out;
        }

        .input-group {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        input[type="text"] {
            flex: 1;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem 1.5rem;
            border-radius: 16px;
            color: var(--text);
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        button.add-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 0 2rem;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button.add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px var(--secondary);
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .task-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.03);
            padding: 1rem 1.5rem;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            animation: slideIn 0.3s ease-out;
        }

        .task-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(5px);
        }

        .task-content {
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
        }

        .task-checkbox {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            border: 2px solid var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .task-item.completed .task-checkbox {
            background: var(--primary);
            border-color: var(--primary);
        }
        
        .task-item.completed .task-text {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .task-text {
            font-size: 1.1rem;
            transition: color 0.2s;
        }

        .delete-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.2rem;
            transition: color 0.2s, transform 0.2s;
        }

        .delete-btn:hover {
            color: #ef4444;
            transform: scale(1.1);
        }

        .empty-state {
            text-align: center;
            padding: 3rem 0;
            color: var(--text-muted);
        }
        .empty-state i { font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }

        /* Animations */
        @keyframes slideDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }

    </style>
</head>
<body>

    <div class="header">
        <h1>TaskMaster</h1>
        <p style="color: var(--text-muted); font-size: 1.2rem;">Real-time 3-Tier K8s Application</p>
        
        <div class="status-bar">
            <div class="status-indicator">
                <div class="dot online"></div> Frontend: Active
            </div>
            <div class="status-indicator">
                <div class="dot" id="backend-dot"></div> Backend API: <span id="backend-text">Connecting...</span>
            </div>
        </div>
    </div>

    <div class="app-container">
        <form class="input-group" id="task-form">
            <input type="text" id="task-input" placeholder="What needs to be done?" required autocomplete="off">
            <button type="submit" class="add-btn"><i class="fas fa-plus"></i> Add</button>
        </form>

        <div class="task-list" id="task-list">
            <!-- Tasks will be loaded here -->
            <div class="empty-state">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Loading tasks from Database...</p>
            </div>
        </div>
    </div>

    <script>
        const taskForm = document.getElementById('task-form');
        const taskInput = document.getElementById('task-input');
        const taskList = document.getElementById('task-list');
        const backendDot = document.getElementById('backend-dot');
        const backendText = document.getElementById('backend-text');

        // Check Backend Status
        async function checkStatus() {
            try {
                const res = await fetch('/healthz');
                if (res.ok) {
                    backendDot.className = 'dot online';
                    backendText.textContent = 'Connected (MongoDB Active)';
                } else {
                    throw new Error('API Error');
                }
            } catch (e) {
                backendDot.className = 'dot offline';
                backendText.textContent = 'Disconnected';
            }
        }

        // Fetch Tasks
        async function fetchTasks() {
            try {
                const res = await fetch('/api/tasks');
                const tasks = await res.json();
                renderTasks(tasks);
            } catch (e) {
                taskList.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Failed to load tasks. Check backend connection.</p></div>`;
            }
        }

        // Render Tasks
        function renderTasks(tasks) {
            if (tasks.length === 0) {
                taskList.innerHTML = `<div class="empty-state"><i class="fas fa-clipboard-list"></i><p>No tasks yet. Add one above!</p></div>`;
                return;
            }

            taskList.innerHTML = tasks.map(task => `
                <div class="task-item ${task.completed ? 'completed' : ''}" id="task-${task._id}">
                    <div class="task-content" onclick="toggleTask('${task._id}', ${!task.completed})">
                        <div class="task-checkbox">
                            ${task.completed ? '<i class="fas fa-check" style="color: white; font-size: 12px;"></i>' : ''}
                        </div>
                        <span class="task-text">${escapeHtml(task.title)}</span>
                    </div>
                    <button class="delete-btn" onclick="deleteTask('${task._id}')">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>
            `).join('');
        }

        // Add Task
        taskForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = taskInput.value.trim();
            if (!title) return;

            const btn = taskForm.querySelector('button');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

            try {
                await fetch('/api/tasks', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title })
                });
                taskInput.value = '';
                fetchTasks();
            } catch (e) {
                console.error('Error adding task:', e);
            } finally {
                btn.innerHTML = '<i class="fas fa-plus"></i> Add';
            }
        });

        // Toggle Task Status
        async function toggleTask(id, completed) {
            try {
                await fetch(`/api/tasks/${id}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ completed })
                });
                fetchTasks();
            } catch (e) {
                console.error('Error updating task:', e);
            }
        }

        // Delete Task
        async function deleteTask(id) {
            try {
                await fetch(`/api/tasks/${id}`, { method: 'DELETE' });
                fetchTasks();
            } catch (e) {
                console.error('Error deleting task:', e);
            }
        }

        function escapeHtml(unsafe) {
            return unsafe.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        // Init
        checkStatus();
        fetchTasks();
        setInterval(checkStatus, 10000); // Check status every 10s
    </script>
</body>
</html>
